name: Parax Tests

# Run this workflow on all pushes and pull requests to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # This will run your tests across three different Python versions simultaneously!
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Caches dependencies so future runs are much faster

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test] pytest-codeblocks matplotlib

    - name: Run standard test suite
      run: |
        # Run all tests in the tests/ directory
        pytest tests/

    - name: Test documentation examples
      run: |
        # Run the codeblocks inside your markdown files
        pytest --codeblocks docs/